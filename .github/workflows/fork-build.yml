# Simplified image build for fork deployments.
# Builds gateway and sandbox images on push to main and pushes to GHCR.
# Uses standard GitHub Actions runners (no custom CI image or BuildKit endpoints).

name: Build Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/hungtd9/openshell

jobs:
  build-gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.images
          target: gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/gateway:${{ github.sha }}
            ${{ env.REGISTRY }}/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.images
          target: sandbox
          push: true
          tags: |
            ${{ env.REGISTRY }}/sandbox:${{ github.sha }}
            ${{ env.REGISTRY }}/sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
