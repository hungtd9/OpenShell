# Build gateway and sandbox images for the fork on public GitHub.
# Produces the same multi-arch manifest (linux/amd64 + linux/arm64) and
# flags (--provenance=false) as docker-build.yml, using GitHub-hosted runners.

name: Build Fork Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/hungtd9/openshell

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        component: [gateway, sandbox]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.images
          target: ${{ matrix.component }}
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.component }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.component }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.component }}-${{ matrix.arch }},mode=max

  manifest:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [gateway, sandbox]
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag "${{ env.REGISTRY }}/${{ matrix.component }}:${{ github.sha }}" \
            --tag "${{ env.REGISTRY }}/${{ matrix.component }}:latest" \
            "${{ env.REGISTRY }}/${{ matrix.component }}:${{ github.sha }}-amd64" \
            "${{ env.REGISTRY }}/${{ matrix.component }}:${{ github.sha }}-arm64"
